services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "3000:5173"
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: backend
    ports:
      - "8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "uv",
          "run",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
